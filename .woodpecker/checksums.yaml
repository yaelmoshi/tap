# homebrew-tap checksums — auto-update sha256 on Renovate version-bump branches
when:
  - event: push
    branch: "renovate/*"
    path:
      - "Formula/**"
      - "Casks/**"

steps:
  - name: update-checksums
    image: ghcr.io/homebrew/brew:latest@sha256:b5e25c16905b97f737549ca9aed6c5f39d0e2f0322a2bd4ed52fa79d39fc2b31
    environment:
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - CHANGED=$(git diff --name-only origin/main -- 'Casks/*.rb' 'Formula/*.rb' | tr '\n' ' ')
      - |
        if [ -z "$CHANGED" ]; then
          echo "No changed formula/cask files"
          exit 0
        fi
      - 'echo "Changed files: $CHANGED"'
      - bash Scripts/update-checksums.sh $CHANGED
      - git config user.name "Woodpecker CI"
      - git config user.email "ci@m0sh1.cc"
      - 'git remote set-url origin "https://x-access-token:$GITHUB_TOKEN@github.com/yaelmoshi/tap.git"'
      - git add Formula/ Casks/
      - |
        if git diff --cached --quiet; then
          echo "No checksum changes needed"
          exit 0
        fi
      - 'git commit -m "fix: update sha256 checksums [CI SKIP]"'
      - git push origin HEAD
