# homebrew-tap lint — tap syntax validation + shellcheck
when:
  - event: [pull_request]
    path:
      - "Formula/**"
      - "Casks/**"
      - "Scripts/**"
      - ".woodpecker/**"
  - event: push
    branch: main
    path:
      - "Formula/**"
      - "Casks/**"
      - "Scripts/**"
      - ".woodpecker/**"
  - event: manual

steps:
  - name: tap-syntax
    image: ghcr.io/homebrew/brew:latest@sha256:b5e25c16905b97f737549ca9aed6c5f39d0e2f0322a2bd4ed52fa79d39fc2b31
    environment:
      HOMEBREW_NO_ANALYTICS: "1"
      HOMEBREW_NO_AUTO_UPDATE: "1"
      HOMEBREW_NO_COLOR: "1"
      HOMEBREW_DEVELOPER: "1"
    commands:
      - brew tap-new --no-git yaelmoshi/tap
      - TAP_PATH="$(brew --repository)/Library/Taps/yaelmoshi/homebrew-tap"
      - mkdir -p "$TAP_PATH/Formula" "$TAP_PATH/Casks"
      - cp -r Formula/* "$TAP_PATH/Formula/" 2>/dev/null || true
      - cp -r Casks/* "$TAP_PATH/Casks/" 2>/dev/null || true
      - brew audit --tap yaelmoshi/tap || true
      - brew style yaelmoshi/tap

  - name: shellcheck
    image: koalaman/shellcheck-alpine:stable@sha256:c82fe42504fbc9fc68f15d36638e5ee2324ebb8b94e96a3c4e395bf361c49183
    commands:
      - find Scripts -type f -name "*.sh" -print0 | xargs -0 shellcheck -S error
