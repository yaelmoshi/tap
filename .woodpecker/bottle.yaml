# homebrew-tap bottle — build ARM64 bottle on Mac via SSH, release to GitHub
when:
  - event: push
    branch: main
    path:
      - "Formula/fast-cli.rb"
  - event: manual

steps:
  - name: bottle-arm
    image: dhi.io/alpine-base:3.23-dev@sha256:8e77884b4e74639e217160cd7dd8af957d23b44a59392b117e4da6ca8c2e2c6e
    environment:
      GITHUB_TOKEN:
        from_secret: github_token
      SSH_KEY:
        from_secret: mac_builder_ssh_key
    commands:
      - apk add --no-cache openssh-client bash
      - mkdir -p ~/.ssh && chmod 700 ~/.ssh
      - printf '%s\n' "$SSH_KEY" > ~/.ssh/id_rsa && chmod 600 ~/.ssh/id_rsa
      - ssh-keyscan -H 10.0.0.6 >> ~/.ssh/known_hosts 2>/dev/null
      - |
        ssh yaelmeya@10.0.0.6 "export GITHUB_TOKEN='${GITHUB_TOKEN}'; export CI_COMMIT_SHA='${CI_COMMIT_SHA}'; bash" <<'REMOTE_EOF'
        set -euo pipefail
        WORKDIR=$(mktemp -d)
        git clone --depth=50 "https://x-access-token:${GITHUB_TOKEN}@github.com/yaelmoshi/tap.git" "$WORKDIR"
        cd "$WORKDIR" && git checkout "${CI_COMMIT_SHA}"
        export GITHUB_TOKEN
        bash "$WORKDIR/Scripts/bottle-arm.sh" "$WORKDIR"
        rm -rf "$WORKDIR"
        REMOTE_EOF
